<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Recommender</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg">
    <div class="container-fluid">

        <span class="navbar-brand">📚 BookAI</span>

        <span class="navbar-center-title">Top 50 Books</span>

        <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link active" href="/">Home</a></li>
            <li class="nav-item"><a class="nav-link" href="/recommend">Recommend</a></li>
        </ul>

    </div>
</nav>

<!-- BOOKS -->
<div class="container mt-5">
    <div class="row">
        {% for i in range(book_name|length) %}
        <div class="col-md-3 mb-4">
            <div class="card">
                <img src="{{book_image[i]}}">
                <div class="card-body">
                    <h5 class="card-title">{{book_name[i]}}</h5>
                    <p class="card-text">{{author_name[i]}}</p>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>

</body>
</html>
