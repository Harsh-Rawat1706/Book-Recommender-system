<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Recommender System</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">

</head>
<style>
    .text-white{
        color: white;
    }
</style>
<body style = "background-color:black">
    <nav class = "navbar" style = "background-color:#00a65a">
        <p class = "navbar-text">My Book Recommender System</p>
        <ul class="nav navbar-nav">
            <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
            <li class="nav-item"><a class="nav-link" href="/recommend">Recommend</a></li>
            <li class="nav-item"><a class="nav-link" href="/about">About</a></li>
        </ul>
    </nav>
    <div class = "container">
        <div class ="row">
            <div class="col-md-12">
                <h1 class = "text-white" style = "font-size:50px">Top 50 Books</h1>
            </div>
            {% for i in range(book_name|length) %}
                <div class = "col-md-3" style = "margin-top:30px">
                <div class="card">
                    <div class="card-body">
                        <img class = "card-img-top" src={{book_image[i]}}>
                        <h3>{{book_name[i]}}</h3>
                        <p>{{author_name[i]}}</p>
                    </div>
                </div>
            </div>
            {% endfor %}
</body>
</html>
