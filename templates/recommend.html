<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Recommender System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .text-white {
            color: white;
        }
    </style>
</head>
<body style="background-color:black">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg" style="background-color:#00a65a">
        <div class="container-fluid">
            <span class="navbar-brand text-white">My Book Recommender System</span>
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link text-white" href="/">Home</a></li>
                <li class="nav-item"><a class="nav-link text-white" href="/recommend">Recommend</a></li>
                <li class="nav-item"><a class="nav-link text-white" href="/about">About</a></li>
            </ul>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container mt-4">
        <div class="row">
            <div class="col-md-12">
                <h1 class="text-white display-4">Recommended Books</h1>
                <form action="/recommend_books" method="POST" class="mb-4">
                    <input name="user_input" type="text" class="form-control mb-3" placeholder="Search for books...">
                    <button type="submit" class="btn btn-primary">Search</button>
                </form>
            </div>
        </div>
        {% if error_message %}
        <div class="alert alert-warning mt-4">{{ error_message }}</div>
        {% endif %}
        {% if recommended_books %}
        <div class="row">
           {% for i in recommended_books %}
                <div class="col-md-3 mt-4">
                    <div class="card">
                        <img class="card-img-top" src="{{ i.image_url }}" alt="{{ i.title }} Book Cover">
                        <div class="card-body">
                            <h5 class="card-title">{{ i.title }}</h5>
                            <p class="card-text">{{ i.author }}</p>
                        </div>
                    </div>
                </div>
           {% endfor %}
        </div>
        {% endif %}
    </div>
</body>
</html>
